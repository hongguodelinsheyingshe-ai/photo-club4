<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDUT 攝影社旗艦管理系統 V28</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .active-tab { background: #1e293b; color: #60a5fa; border-left: 4px solid #3b82f6; font-weight: 900; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .st-p { background: #dcfce7; color: #166534; } .st-a { background: #fee2e2; color: #991b1b; }
        .st-l { background: #fef9c3; color: #854d0e; } .st-o { background: #e0f2fe; color: #0369a1; }
        .st-n { background: #f1f5f9; color: #94a3b8; }
    </style>
</head>
<body class="text-slate-800">

    <div id="login-section" class="flex items-center justify-center min-h-screen bg-slate-900">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md border-t-8 border-blue-600 text-center">
            <i class="fas fa-camera-retro text-6xl text-blue-600 mb-4"></i>
            <h1 class="text-2xl font-black mb-1">HDUT PHOTO V28</h1>
            <p class="text-slate-400 text-xs mb-8 uppercase tracking-widest font-bold">Role & Permission Master</p>
            <div class="space-y-4 text-left">
                <input type="text" id="username" placeholder="學號" class="w-full px-4 py-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                <input type="password" id="password" placeholder="密碼" class="w-full px-4 py-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition">進入智慧系統</button>
            </div>
        </div>
    </div>

    <div id="main-system" class="hidden flex min-h-screen">
        <aside class="w-64 bg-slate-900 text-white flex flex-col shrink-0 shadow-xl">
            <div class="p-6">
                <div class="flex items-center space-x-3 mb-10 text-blue-400">
                    <i class="fas fa-user-shield text-2xl"></i>
                    <span class="font-black text-xl tracking-tighter text-white">HDUT V28</span>
                </div>
                <nav class="space-y-1" id="sidebar-nav"></nav>
            </div>
            <div class="mt-auto p-6 border-t border-slate-800 text-center">
                <p id="display-name" class="font-bold text-sm">--</p>
                <p id="display-role" class="text-[10px] text-blue-400 font-black uppercase mb-4 tracking-tighter">--</p>
                <button onclick="location.reload()" class="w-full py-2 text-xs text-red-400 font-bold hover:bg-red-500/10 rounded-lg">登出系統</button>
            </div>
        </aside>

        <main class="flex-1 h-screen overflow-y-auto p-8">
            <header class="flex justify-between items-center mb-8">
                <h2 id="tab-title" class="text-3xl font-black text-slate-800 tracking-tight">管理中心</h2>
                <p id="save-status" class="text-[10px] text-green-500 font-bold opacity-0 transition-opacity italic">● 權限連動已就緒</p>
            </header>

            <section id="content-profile" class="tab-content">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="col-span-2 space-y-6">
                        <div class="bg-gradient-to-br from-slate-800 to-blue-900 rounded-[2.5rem] p-10 text-white shadow-xl relative overflow-hidden">
                            <h3 class="font-bold text-lg mb-6">我的學期數據</h3>
                            <div class="grid grid-cols-3 gap-4 text-center">
                                <div class="bg-white/10 p-4 rounded-2xl"><p class="text-[10px] text-blue-200 uppercase font-black">出勤分</p><p id="my-att" class="text-3xl font-black">--</p></div>
                                <div class="bg-white/10 p-4 rounded-2xl"><p class="text-[10px] text-blue-200 uppercase font-black">加分</p><p id="my-bonus" class="text-3xl font-black text-green-300">--</p></div>
                                <div class="bg-white/10 p-4 rounded-2xl border border-white/20"><p class="text-[10px] text-blue-200 uppercase font-black">預估總成績</p><p id="my-total" class="text-3xl font-black text-yellow-400">--</p></div>
                            </div>
                        </div>
                        <div class="bg-white rounded-[2rem] p-8 border shadow-sm">
                            <p class="text-xs font-bold text-slate-400 mb-4 uppercase">提交請假單</p>
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <input type="date" id="leave-date" class="bg-slate-50 p-3 rounded-xl text-sm border-none">
                                <select id="leave-type" class="bg-slate-50 p-3 rounded-xl text-sm border-none"><option value="事假">事假</option><option value="病假">病假</option><option value="公假">公假</option></select>
                            </div>
                            <textarea id="leave-reason" placeholder="請填寫具體原因..." class="w-full bg-slate-50 p-3 rounded-xl text-sm mb-4 border-none"></textarea>
                            <button onclick="submitLeave()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg">送出申請</button>
                        </div>
                    </div>
                    <div class="space-y-6">
                        <div class="bg-white rounded-[2rem] p-8 border shadow-sm text-center">
                            <h3 class="font-bold mb-6 text-sm">密碼安全性</h3>
                            <button onclick="changeMyPassword()" class="w-full py-4 bg-slate-900 text-white rounded-2xl text-xs font-black shadow-lg">修改登入密碼</button>
                        </div>
                        <div id="my-leave-status" class="bg-white rounded-[2rem] p-6 border shadow-sm space-y-2 text-xs"></div>
                    </div>
                </div>
            </section>

            <section id="content-assets" class="tab-content">
                <div class="flex justify-between items-center mb-8">
                    <p class="text-slate-400 font-bold">社團總資產數：<span id="asset-count" class="text-blue-600">0</span></p>
                    <button id="admin-asset-btn" onclick="addAsset()" class="hidden bg-slate-900 text-white px-6 py-2 rounded-xl text-xs font-black shadow-md">+ 新增資產紀錄</button>
                </div>
                <div id="asset-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </section>

            <section id="content-members" class="tab-content">
                <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-8">
                        <div>
                            <h3 class="font-black text-slate-800 mb-4 text-sm tracking-widest">系統職位與權限矩陣</h3>
                            <div id="role-matrix-list" class="space-y-4"></div>
                            <button onclick="addNewRole()" class="mt-6 w-full py-3 bg-slate-50 text-slate-400 rounded-xl text-xs font-bold border-2 border-dashed">+ 新增幹部職稱</button>
                        </div>
                        <hr>
                        <div>
                            <h3 class="font-black text-slate-800 mb-4 text-sm tracking-widest">出勤扣分標準</h3>
                            <div class="space-y-3 text-xs">
                                <div class="flex justify-between">曠課 (a) <input id="r-abs" class="w-10 border-b text-center font-bold" onchange="saveRules()"></div>
                                <div class="flex justify-between">遲到 (l) <input id="r-late" class="w-10 border-b text-center font-bold" onchange="saveRules()"></div>
                                <div class="flex justify-between">請假 (o) <input id="r-leave" class="w-10 border-b text-center font-bold" onchange="saveRules()"></div>
                            </div>
                        </div>
                        <button onclick="exportData()" class="w-full py-3 bg-blue-50 text-blue-600 rounded-xl text-[10px] font-black tracking-widest uppercase">Export Backup (JSON)</button>
                    </div>
                    <div class="xl:col-span-2 bg-white p-8 rounded-[2.5rem] border shadow-sm">
                        <div class="flex justify-between items-center mb-6"><h3 class="font-bold text-lg">全社員權限庫</h3><button onclick="addNewUser()" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-xs font-black shadow-lg">+ 新增成員</button></div>
                        <div class="overflow-x-auto"><table class="w-full text-xs text-left"><thead class="bg-slate-50 text-slate-400 font-bold"><tr><th class="p-4">姓名/學號</th><th class="p-4">指定職稱</th><th class="p-4 text-center">刪除</th></tr></thead><tbody id="member-db-list"></tbody></table></div>
                    </div>
                </div>
            </section>

            <section id="content-attendance" class="tab-content"><div class="bg-white rounded-[2.5rem] p-8 shadow-sm border overflow-x-auto"><div class="flex justify-between items-center mb-6"><div class="flex items-center space-x-3"><input type="date" id="att-date" onchange="renderAttendance()" class="bg-slate-50 p-2 rounded-lg font-bold border-none text-sm"><button onclick="markAllPresent()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold">全員出席</button></div></div><table class="w-full text-xs text-left"><thead class="bg-slate-50 text-slate-400 font-bold"><tr><th class="p-4">姓名</th><th class="p-4 text-center">狀態</th><th class="p-4">備註</th></tr></thead><tbody id="attendance-list"></tbody></table></div></section>
            
            <section id="content-grades" class="tab-content"><div class="bg-white rounded-[2.5rem] p-8 shadow-sm border overflow-x-auto"><div class="flex flex-wrap gap-6 mb-8 bg-slate-50 p-6 rounded-[2rem] items-center">出席 <input id="w-att" class="w-10 border-b bg-transparent text-center" onchange="saveWeights()">% 作業 <input id="w-hw" class="w-10 border-b bg-transparent text-center" onchange="saveWeights()">% 期中 <input id="w-mid" class="w-10 border-b bg-transparent text-center" onchange="saveWeights()">% 期末 <input id="w-final" class="w-10 border-b bg-transparent text-center" onchange="saveWeights()">%<button onclick="addHw()" class="ml-auto bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold">+ 新增作業</button></div><table class="w-full text-[10px] text-center"><thead class="text-slate-400 font-bold border-b"><tr><th class="p-3 text-left">社員</th><th class="p-3">出勤</th><th id="hw-header-row" class="contents"></th><th class="p-3 bg-blue-50/20">期中</th><th class="p-3 bg-blue-50/20">期末</th><th class="p-3">加分</th><th class="p-3 font-black text-slate-900">學期分</th></tr></thead><tbody id="grade-list"></tbody></table></div></section>

            <section id="content-leaves" class="tab-content"><div class="bg-white rounded-[2.5rem] p-8 border shadow-sm"><h3 class="font-bold text-slate-400 mb-6 uppercase text-sm">假單審核清單</h3><div class="overflow-x-auto"><table class="w-full text-xs text-left"><thead class="bg-slate-50 text-slate-400 font-bold"><tr><th class="p-4">姓名</th><th class="p-4">日期</th><th class="p-4">類別</th><th class="p-4">理由</th><th class="p-4 text-center">操作</th></tr></thead><tbody id="admin-leave-list"></tbody></table></div></div></section>
            
            <section id="content-journal" class="tab-content"><div class="grid grid-cols-1 lg:grid-cols-2 gap-8"><div class="bg-white rounded-[2.5rem] p-8 border shadow-sm"><input type="date" id="j-date" onchange="renderJournal()" class="mb-4 bg-slate-100 p-2 rounded-lg font-bold text-sm"><input id="j-topic" placeholder="課程主題" oninput="saveJournal()" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 border-none outline-none focus:ring-1 focus:ring-blue-500"><textarea id="j-content" rows="6" placeholder="紀錄內容..." oninput="saveJournal()" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-1 focus:ring-blue-500"></textarea></div><div class="bg-white rounded-[2.5rem] p-8 border shadow-sm flex flex-col items-center justify-center border-dashed border-4 border-slate-100"><button onclick="document.getElementById('imgIn').click()" class="text-slate-300 hover:text-blue-500 flex flex-col items-center font-black"><i class="fas fa-camera-retro text-4xl mb-3"></i>上傳教學照片</button><input type="file" id="imgIn" multiple accept="image/*" class="hidden" onchange="handleJournalImg(this)"><div id="journal-gallery" class="grid grid-cols-3 gap-3 mt-8 w-full"></div></div></div></section>
        </main>
    </div>

    <div id="borrow-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="font-black text-lg mb-6">器材借用登記</h3>
            <select id="borrower-select" class="w-full p-4 bg-slate-50 rounded-2xl mb-6 outline-none border-none text-sm font-bold"></select>
            <div class="flex space-x-3"><button onclick="closeBorrowModal()" class="flex-1 py-3 bg-slate-100 rounded-2xl font-bold text-slate-400">取消</button><button onclick="confirmBorrow()" class="flex-1 py-3 bg-blue-600 text-white rounded-2xl font-bold">確認借出</button></div>
        </div>
    </div>

    <script>
        // --- 核心資料庫 (V28 權限矩陣結構) ---
        const INITIAL_DB = {
            config: { weights: { att: 40, hw: 20, mid: 20, final: 20 }, rules: { absent: 10, late: 2, leave: 5 } },
            roles: {
                "master": { label: "社長", canAdmin: true, canAtt: true, canGrade: true, canJournal: true, canAssetAdmin: true, canLeave: true },
                "officer_edu": { label: "教務", canAdmin: false, canAtt: true, canGrade: true, canJournal: true, canAssetAdmin: false, canLeave: true },
                "officer_equip": { label: "器材", canAdmin: false, canAtt: false, canGrade: false, canJournal: false, canAssetAdmin: true, canLeave: false },
                "member": { label: "社員", canAdmin: false, canAtt: false, canGrade: false, canJournal: false, canAssetAdmin: false, canLeave: false }
            },
            users: [{ id: "admin", pass: "123", name: "鄭羽智", role: "master", bonus: 0, midterm: 0, final: 0, hw: {} }],
            homeworks: ["首次作業"],
            assets: [{ id: 101, name: "Canon R6 II", borrower: null, date: "" }],
            attendance: {}, journals: {}, leaves: []
        };

        let db = JSON.parse(localStorage.getItem('hdut_v28_db')) || INITIAL_DB;
        let currentUser = null, activeAssetId = null;
        const today = new Date().toISOString().slice(0, 10);

        function sync() {
            localStorage.setItem('hdut_v28_db', JSON.stringify(db));
            const s = document.getElementById('save-status'); s.style.opacity = 1; setTimeout(() => s.style.opacity = 0, 2000);
            renderAll();
        }

        // --- 登入與導航權限控制 ---
        function handleLogin() {
            const u = document.getElementById('username').value, p = document.getElementById('password').value;
            const found = db.users.find(x => x.id === u && x.pass === p);
            if (found) {
                currentUser = found; document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-system').classList.remove('hidden'); renderSidebar(); showTab('profile');
            } else alert("登入失敗");
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav'), p = db.roles[currentUser.role];
            let html = `<button onclick="showTab('profile')" id="btn-profile" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition active-tab"><i class="fas fa-home w-5"></i><span>個人中心</span></button>`;
            if(p.canLeave) html += `<button onclick="showTab('leaves')" id="btn-leaves" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-400 hover:text-white"><i class="fas fa-envelope-open-text w-5"></i><span>假單審核</span></button>`;
            if(p.canAdmin) html += `<button onclick="showTab('members')" id="btn-members" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-400 hover:text-white"><i class="fas fa-user-shield w-5"></i><span>社員與權限</span></button>`;
            if(p.canAtt) html += `<button onclick="showTab('attendance')" id="btn-attendance" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-400 hover:text-white"><i class="fas fa-calendar-check w-5"></i><span>點名系統</span></button>`;
            if(p.canGrade) html += `<button onclick="showTab('grades')" id="btn-grades" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-400 hover:text-white"><i class="fas fa-award w-5"></i><span>表現評分</span></button>`;
            html += `<button onclick="showTab('assets')" id="btn-assets" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-400 hover:text-white"><i class="fas fa-camera w-5"></i><span>器材管理</span></button>`;
            if(p.canJournal) html += `<button onclick="showTab('journal')" id="btn-journal" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-400 hover:text-white"><i class="fas fa-book w-5"></i><span>教學日誌</span></button>`;
            nav.innerHTML = html;
        }

        function showTab(tid) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-tab', 'text-white'));
            document.getElementById('content-' + tid).classList.add('active');
            if(document.getElementById('btn-'+tid)) document.getElementById('btn-'+tid).classList.add('active-tab', 'text-white');
            document.getElementById('tab-title').innerText = document.getElementById('btn-'+tid).innerText;
            if(tid==='attendance') renderAttendance();
            if(tid==='grades') renderGrades();
            if(tid==='leaves') renderAdminLeaves();
            if(tid==='journal') renderJournal();
            renderAll();
        }

        // --- 器材模組 (權限連動) ---
        function openBorrowModal(id) { activeAssetId = id; document.getElementById('borrower-select').innerHTML = db.users.map(u => `<option value="${u.name}">${u.name}</option>`).join(''); document.getElementById('borrow-modal').classList.remove('hidden'); }
        function closeBorrowModal() { document.getElementById('borrow-modal').classList.add('hidden'); }
        function confirmBorrow() { const a = db.assets.find(x => x.id === activeAssetId); a.borrower = document.getElementById('borrower-select').value; a.date = today; closeBorrowModal(); sync(); }
        function returnAsset(id) { const a = db.assets.find(x => x.id === id); a.borrower = null; a.date = ""; sync(); }
        function addAsset() { const n = prompt("資產名稱:"); if(n) { db.assets.push({id:Date.now(), name:n, borrower:null, date:""}); sync(); } }
        function deleteAsset(id) { if(confirm("移除此器材？")){ db.assets = db.assets.filter(a=>a.id!==id); sync(); } }

        // --- 權限與矩陣自訂 ---
        function renderAll() {
            if(!currentUser) return; const p = db.roles[currentUser.role];
            document.getElementById('display-name').innerText = currentUser.name;
            document.getElementById('display-role').innerText = p.label;

            // 個人數據
            const attScore = calculateAttScore(currentUser.id);
            document.getElementById('my-att').innerText = attScore;
            document.getElementById('my-bonus').innerText = currentUser.bonus || 0;
            const final = Math.round((attScore*(db.config.weights.att/100)) + (currentUser.bonus || 0));
            document.getElementById('my-total').innerText = final;

            // 器材渲染 (行政權限)
            if(p.canAssetAdmin) document.getElementById('admin-asset-btn').classList.remove('hidden');
            document.getElementById('asset-count').innerText = db.assets.length;
            document.getElementById('asset-grid').innerHTML = db.assets.map(a => `
                <div class="bg-white p-6 rounded-[2.5rem] border ${a.borrower?'bg-orange-50 border-orange-200 shadow-orange-100/50':'border-slate-100 shadow-sm'}">
                    <div class="flex justify-between font-black uppercase text-[9px] mb-4"><span class="${a.borrower?'text-orange-500':'text-green-500'}">${a.borrower?'借出: '+a.borrower:'在庫'}</span>${p.canAssetAdmin?`<button onclick="deleteAsset(${a.id})" class="text-red-200 hover:text-red-500">移除</button>`:''}</div>
                    <h4 class="font-bold mb-4">${a.name}</h4>
                    <button onclick="${a.borrower?'returnAsset':'openBorrowModal'}(${a.id})" class="w-full py-3 rounded-2xl text-[10px] font-black tracking-widest ${a.borrower?'bg-white border text-slate-400':'bg-slate-900 text-white shadow-md'}">${a.borrower?'歸還':'借用'}</button>
                </div>
            `).join('');

            // 權限矩陣渲染
            if(p.canAdmin) {
                document.getElementById('r-abs').value = db.config.rules.absent;
                document.getElementById('r-late').value = db.config.rules.late;
                document.getElementById('r-leave').value = db.config.rules.leave;
                document.getElementById('role-matrix-list').innerHTML = Object.keys(db.roles).map(rk => `
                    <div class="bg-slate-50 p-4 rounded-2xl space-y-3">
                        <div class="flex justify-between font-black text-slate-800 text-xs"><span>職稱：${db.roles[rk].label}</span></div>
                        <div class="grid grid-cols-2 gap-2 text-[9px] text-slate-400 font-bold uppercase">
                            <label><input type="checkbox" ${db.roles[rk].canAtt?'checked':''} onchange="db.roles['${rk}'].canAtt=!db.roles['${rk}'].canAtt;sync()"> 點名</label>
                            <label><input type="checkbox" ${db.roles[rk].canGrade?'checked':''} onchange="db.roles['${rk}'].canGrade=!db.roles['${rk}'].canGrade;sync()"> 評分</label>
                            <label><input type="checkbox" ${db.roles[rk].canAssetAdmin?'checked':''} onchange="db.roles['${rk}'].canAssetAdmin=!db.roles['${rk}'].canAssetAdmin;sync()"> 器材行政</label>
                            <label><input type="checkbox" ${db.roles[rk].canLeave?'checked':''} onchange="db.roles['${rk}'].canLeave=!db.roles['${rk}'].canLeave;sync()"> 假單</label>
                        </div>
                    </div>
                `).join('');
                document.getElementById('member-db-list').innerHTML = db.users.map((u, i) => `<tr class="border-b"><td class="p-4 font-bold">${u.name}<br><span class="text-[9px] text-slate-300 font-mono">${u.id}</span></td><td class="p-4"><select onchange="db.users[${i}].role=this.value;sync()" class="p-2 border rounded-xl text-[10px] bg-white">${Object.keys(db.roles).map(rk => `<option value="${rk}" ${u.role===rk?'selected':''}>${db.roles[rk].label}</option>`).join('')}</select></td><td class="p-4 text-center"><button onclick="removeUser(${i})" class="text-red-300">×</button></td></tr>`).join('');
            }
        }

        // --- 成績、點名、日誌等模組 (依據權限連動) ---
        function calculateAttScore(uid) { let s = 100; Object.values(db.attendance).forEach(d => { const r = d[uid]?.s; if(r==='a') s -= db.config.rules.absent; if(r==='l') s -= db.config.rules.late; if(r==='o') s -= db.config.rules.leave; }); return Math.max(0, s); }
        function renderAttendance() { const dt = document.getElementById('att-date').value || today; if(!db.attendance[dt]) db.attendance[dt] = {}; document.getElementById('attendance-list').innerHTML = db.users.map(u => { const r = db.attendance[dt][u.id] || { s: 'n', n: '' }; const badges = { n: 'st-n', p: 'st-p', l: 'st-l', a: 'st-a', o: 'st-o' }; const texts = { n: '未點', p: '出席', l: '遲到', a: '曠課', o: '請假' }; return `<tr class="border-b"><td class="p-4 font-bold text-slate-700">${u.name}</td><td class="p-4 text-center" onclick="toggleAtt('${dt}','${u.id}')"><span class="px-5 py-1 rounded-full text-[10px] font-black cursor-pointer shadow-sm ${badges[r.s]}">${texts[r.s]}</span></td><td class="p-4"><input value="${r.n}" oninput="updAttNote('${dt}','${u.id}',this.value)" class="w-full bg-transparent text-[10px] outline-none"></td></tr>`; }).join(''); }
        function toggleAtt(dt, uid) { if(!db.attendance[dt][uid]) db.attendance[dt][uid] = {s:'n',n:''}; const seq=['n','p','l','a','o']; db.attendance[dt][uid].s = seq[(seq.indexOf(db.attendance[dt][uid].s)+1)%5]; sync(); renderAttendance(); }
        function updAttNote(dt, uid, v) { if(!db.attendance[dt][uid]) db.attendance[dt][uid]={s:'n',n:''}; db.attendance[dt][uid].n = v; localStorage.setItem('hdut_v28_db', JSON.stringify(db)); }
        function markAllPresent() { const dt = document.getElementById('att-date').value; db.users.forEach(u => { if(!db.attendance[dt][u.id] || db.attendance[dt][u.id].s === 'n') db.attendance[dt][u.id] = {s:'p',n:''}; }); sync(); renderAttendance(); }
        
        function renderGrades() { ['w-att', 'w-hw', 'w-mid', 'w-final'].forEach(id => document.getElementById(id).value = db.config.weights[id.split('-')[1]]); document.getElementById('hw-header-row').innerHTML = db.homeworks.map(h => `<th class="p-3">${h}</th>`).join(''); document.getElementById('grade-list').innerHTML = db.users.map((u, idx) => { const att = calculateAttScore(u.id); const hwAvg = db.homeworks.length ? (db.homeworks.reduce((s, h) => s + (u.hw[h] || 0), 0) / db.homeworks.length) : 0; const tot = Math.round((att*(db.config.weights.att/100)) + (hwAvg*(db.config.weights.hw/100)) + ((u.midterm||0)*(db.config.weights.mid/100)) + ((u.final||0)*(db.config.weights.final/100)) + (u.bonus||0)); return `<tr class="border-b"><td class="p-3 font-bold text-left">${u.name}</td><td class="p-3 font-mono text-blue-600">${att}</td>${db.homeworks.map(h => `<td><input type="number" value="${u.hw[h]||0}" onchange="db.users[${idx}].hw['${h}']=parseInt(this.value);sync()" class="w-8 bg-slate-50 text-center rounded"></td>`).join('')}<td><input type="number" value="${u.midterm||0}" onchange="db.users[${idx}].midterm=parseInt(this.value);sync()" class="w-8 bg-transparent text-center font-bold"></td><td><input type="number" value="${u.final||0}" onchange="db.users[${idx}].final=parseInt(this.value);sync()" class="w-8 bg-transparent text-center font-bold"></td><td><input type="number" value="${u.bonus||0}" onchange="db.users[${idx}].bonus=parseInt(this.value);sync()" class="w-8 text-green-600 font-bold"></td><td class="p-3 font-black text-slate-900">${tot}</td></tr>`; }).join(''); }
        function saveWeights() { db.config.weights.att = parseInt(document.getElementById('w-att').value); db.config.weights.hw = parseInt(document.getElementById('w-hw').value); db.config.weights.mid = parseInt(document.getElementById('w-mid').value); db.config.weights.final = parseInt(document.getElementById('w-final').value); sync(); }
        
        function submitLeave() { const dt = document.getElementById('leave-date').value; const re = document.getElementById('leave-reason').value; if(dt && re) { db.leaves.push({ id: Date.now(), uid: currentUser.id, name: currentUser.name, date: dt, type: document.getElementById('leave-type').value, reason: re, status: 'pending' }); sync(); alert("申請成功"); } }
        function renderAdminLeaves() { const list = document.getElementById('admin-leave-list'), pends = db.leaves.filter(l => l.status === 'pending'); list.innerHTML = pends.length ? pends.map(l => `<tr class="border-b"><td class="p-4 font-bold">${l.name}</td><td class="p-4">${l.date}</td><td class="p-4 text-blue-600 font-bold">${l.type}</td><td class="p-4">${l.reason}</td><td class="p-4 text-center space-x-2"><button onclick="approveLeave(${l.id})" class="bg-green-600 text-white px-3 py-1 rounded text-[9px]">准假</button><button onclick="rejectLeave(${l.id})" class="bg-red-500 text-white px-3 py-1 rounded text-[9px]">駁回</button></td></tr>`).join('') : `<tr><td colspan="5" class="p-8 text-center text-slate-300 italic">無申請單</td></tr>`; }
        function approveLeave(lid) { const l = db.leaves.find(x => x.id === lid); l.status = 'approved'; if(!db.attendance[l.date]) db.attendance[l.date] = {}; db.attendance[l.date][l.uid] = { s: 'o', n: '已准假' }; sync(); }
        function rejectLeave(lid) { db.leaves.find(x => x.id === lid).status = 'rejected'; sync(); }

        function renderJournal() { const d = document.getElementById('j-date').value || today; const j = db.journals[d] || {t:'',c:'',p:[]}; document.getElementById('j-topic').value = j.t; document.getElementById('j-content').value = j.c; document.getElementById('journal-gallery').innerHTML = (j.p||[]).map(p => `<img src="${p}" class="h-24 w-full object-cover rounded-2xl shadow-sm">`).join(''); }
        function saveJournal() { const d = document.getElementById('j-date').value; if(!db.journals[d]) db.journals[d]={t:'',c:'',p:[]}; db.journals[d].t = document.getElementById('j-topic').value; db.journals[d].c = document.getElementById('j-content').value; localStorage.setItem('hdut_v28_db', JSON.stringify(db)); }
        function handleJournalImg(inp) { const d = document.getElementById('j-date').value; if(!db.journals[d]) db.journals[d]={t:'',c:'',p:[]}; Array.from(inp.files).forEach(f => { const r = new FileReader(); r.onload = e => { db.journals[d].p.push(e.target.result); renderJournal(); sync(); }; r.readAsDataURL(f); }); }

        function exportData() { const blob = new Blob([JSON.stringify(db)], { type: "application/json" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `HDUT_V28_RoleMatrix.json`; a.click(); }
        function changeMyPassword() { const n = prompt("輸入新密碼:"); if(n) { db.users.find(u => u.id === currentUser.id).pass = n; sync(); alert("成功"); } }
        function saveRules() { db.config.rules.absent = parseInt(document.getElementById('r-abs').value); db.config.rules.late = parseInt(document.getElementById('r-late').value); db.config.rules.leave = parseInt(document.getElementById('r-leave').value); sync(); }
        function addHw() { const n = prompt("作業名:"); if(n) { db.homeworks.push(n); sync(); } }
        function addNewUser() { const n=prompt("姓名"), id=prompt("學號"); if(n&&id){ db.users.push({id, pass:"123", name:n, role:"member", bonus:0, midterm:0, final:0, hw:{}}); sync(); } }
        function removeUser(i) { if(i===0)return; if(confirm("移除？")){ db.users.splice(i,1); sync(); } }
        function addNewRole() { const n=prompt("稱號名稱 (如: 副社長)"); if(n){ db.roles["r_"+Date.now()] = {label:n, canAdmin:false, canAtt:false, canGrade:false, canJournal:false, canAssetAdmin:false, canLeave:false}; sync(); } }

        document.getElementById('att-date').value = today; document.getElementById('j-date').value = today; document.getElementById('leave-date').value = today;
    </script>
</body>
</html>
